<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intern Performance Evaluation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: #0f172a; /* Dark background */
            color: #f8fafc; /* Light text */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #1e293b; /* Slate-800 */
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            border: 1px solid #334155;
            padding: 30px;
            max-width: 650px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #334155;
            padding-bottom: 15px;
        }

        .header h1 {
            color: #f8fafc;
            font-size: 24px;
        }

        .header p {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 5px;
        }

        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .search-container input {
            flex: 1;
            padding: 12px 15px;
            background-color: #0f172a;
            color: #f8fafc;
            border: 1px solid #475569;
            border-radius: 6px;
            font-size: 15px;
        }

        .search-container input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .search-container input::placeholder {
            color: #64748b;
        }

        .search-container button {
            padding: 0 25px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .search-container button:hover {
            background-color: #2563eb;
        }

        .hint {
            text-align: center;
            font-size: 13px;
            color: #64748b;
            margin-bottom: 25px;
        }

        /* Results Display */
        .results {
            display: none;
        }

        .results.show {
            display: block;
        }

        .intern-profile {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #0f172a;
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid #334155;
            margin-bottom: 20px;
        }

        .intern-profile h3 {
            color: #f1f5f9;
            font-size: 20px;
        }

        .intern-profile span {
            background: #334155;
            color: #e2e8f0;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* Metrics Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .metric-item {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 12px 15px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .metric-item span {
            color: #94a3b8;
            font-size: 13px;
            font-weight: 500;
        }

        .metric-item strong {
            color: #f8fafc;
            font-size: 15px;
        }

        /* Models Container */
        .models-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .model-card {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .model-name {
            color: #94a3b8;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .model-output {
            font-size: 18px;
            font-weight: bold;
        }

        /* Colors for Outputs */
        .High { color: #10b981; } /* Emerald */
        .Medium { color: #3b82f6; } /* Blue */
        .Low { color: #ef4444; } /* Red */

        /* Final Verdict */
        .verdict-box {
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .verdict-high { background-color: #059669; }
        .verdict-medium { background-color: #2563eb; }
        .verdict-low { background-color: #dc2626; }

        /* Loading & Error */
        .loading {
            text-align: center;
            color: #94a3b8;
            padding: 20px;
            display: none;
        }

        .loading.show { display: block; }

        .error {
            background: rgba(220, 38, 38, 0.2);
            color: #fca5a5;
            padding: 12px;
            border: 1px solid rgba(220, 38, 38, 0.4);
            border-radius: 6px;
            margin-top: 10px;
            display: none;
            text-align: center;
        }

        .error.show { display: block; }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Intern Predictive Analytics</h1>
            <p>Evaluation System & Machine Learning Pipeline</p>
        </div>

        <form id="searchForm">
            <div class="search-container">
                <input type="text" id="internId" placeholder="Enter Intern ID (e.g. INT012)" required>
                <button type="submit">Evaluate</button>
            </div>
            <div class="hint">Search range: <strong style="color: #cbd5e1;">INT001</strong> to <strong style="color: #cbd5e1;">INT100</strong></div>
        </form>

        <div class="loading" id="loading">Loading AI Predictions...</div>
        <div class="error" id="error"></div>

        <div class="results" id="results">
            <div class="intern-profile">
                <h3 id="resName">John Doe</h3>
                <span id="resId">INT-000</span>
            </div>

            <div class="metrics-grid" id="metricsContainer">
                <!-- Injected via Script -->
            </div>

            <div class="models-container">
                <div class="model-card">
                    <div class="model-name">Random Forest</div>
                    <div id="rfResult" class="model-output">-</div>
                </div>
                <div class="model-card">
                    <div class="model-name">XGBoost</div>
                    <div id="xgbResult" class="model-output">-</div>
                </div>
                <div class="model-card">
                    <div class="model-name">Decision Tree</div>
                    <div id="dtResult" class="model-output">-</div>
                </div>
            </div>

            <div id="verdictBox" class="verdict-box"></div>
        </div>
    </div>

    <script>
        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const internId = document.getElementById('internId').value.trim().toUpperCase();
            if (!internId) return;

            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const results = document.getElementById('results');

            error.classList.remove('show');
            results.classList.remove('show');
            loading.classList.add('show');

            try {
                const response = await fetch(`/predict-by-id?id=${internId}`);
                const data = await response.json();

                if (!response.ok) throw new Error(data.error || 'Failed to fetch data');

                // Profile
                document.getElementById('resName').textContent = data.name;
                document.getElementById('resId').textContent = data.intern_id;

                // Metrics
                const m = data.fetched_metrics;
                const tasksDone = m.Tasks_Completed;
                const tasksTotal = m.Tasks_Assigned;
                const taskRate = Math.round((tasksDone / tasksTotal) * 100);

                document.getElementById('metricsContainer').innerHTML = `
                    <div class="metric-item"><span>Sprint Completion</span> <strong>${m.Sprint_Completion}%</strong></div>
                    <div class="metric-item"><span>Task Quality</span> <strong>${m.Task_Quality} / 100</strong></div>
                    <div class="metric-item"><span>Attendance</span> <strong>${m.Attendance}%</strong></div>
                    <div class="metric-item"><span>On-Time Delivery</span> <strong>${m.On_Time_Delivery}%</strong></div>
                    <div class="metric-item"><span>Communication</span> <strong>${m.Communication * 10}%</strong></div>
                    <div class="metric-item"><span>Tasks Rate</span> <strong>${taskRate}% (${tasksDone}/${tasksTotal})</strong></div>
                `;

                // Predictions
                document.getElementById('rfResult').textContent = data.random_forest;
                document.getElementById('rfResult').className = `model-output ${data.random_forest}`;

                document.getElementById('xgbResult').textContent = data.xgboost;
                document.getElementById('xgbResult').className = `model-output ${data.xgboost}`;

                document.getElementById('dtResult').textContent = data.decision_tree;
                document.getElementById('dtResult').className = `model-output ${data.decision_tree}`;

                // Final Verdict
                const verdictBox = document.getElementById('verdictBox');
                verdictBox.textContent = `Verdict: ${data.final_verdict} Performer`;
                verdictBox.className = `verdict-box verdict-${data.final_verdict.toLowerCase()}`;

                results.classList.add('show');
            } catch (err) {
                error.textContent = err.message;
                error.classList.add('show');
            } finally {
                loading.classList.remove('show');
            }
        });
    </script>
</body>

</html>
