<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intern Assessment DB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 26px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .search-container input {
            flex: 1;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .search-container input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-container button {
            padding: 14px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .search-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .hint {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-bottom: 25px;
        }

        /* Results Section */
        .results {
            display: none;
            animation: fadeIn 0.5s;
        }

        .results.show {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .intern-profile {
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .intern-profile h3 {
            font-size: 18px;
            color: #333;
        }

        .intern-profile span {
            font-size: 14px;
            color: #666;
            background: #e0e0e0;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            background: #fff;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 8px;
        }

        .metric-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            padding-bottom: 5px;
            border-bottom: 1px solid #f0f0f0;
        }

        .metric-item strong {
            color: #333;
        }

        .models-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .model-card {
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .model-card.rf {
            background: #e8f5e9;
            border: 1px solid #c8e6c9;
            color: #2e7d32;
        }

        .model-card.xgb {
            background: #e3f2fd;
            border: 1px solid #bbdefb;
            color: #1565c0;
        }

        .model-card.dt {
            background: #fff3e0;
            border: 1px solid #ffe0b2;
            color: #e65100;
        }

        .verdict {
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .verdict.high {
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
        }

        .verdict.medium {
            background: linear-gradient(135deg, #2196f3 0%, #1565c0 100%);
        }

        .verdict.low {
            background: linear-gradient(135deg, #f44336 0%, #c62828 100%);
        }

        .verdict.mismatch {
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
        }

        /* Loading & Errors */
        .loading {
            text-align: center;
            color: #667eea;
            display: none;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
            border-left: 4px solid #f44336;
        }

        .error.show {
            display: block;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Intern AI Evaluation</h1>
        </div>

        <form id="searchForm">
            <div class="search-container">
                <input type="text" id="internId" placeholder="Enter Intern ID (e.g., INT001, INT042)" required>
                <button type="submit">Evaluate</button>
            </div>
            <div class="hint">Try searching for <strong>INT001</strong> to <strong>INT100</strong></div>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>Fetching records...
        </div>
        <div class="error" id="error"></div>

        <div class="results" id="results">
            <div class="intern-profile">
                <h3 id="resName">John Doe</h3>
                <span id="resId">INT-000</span>
            </div>

            <div class="metrics-grid" id="metricsContainer"></div>

            <div class="models-container">
                <div class="model-card rf">
                    <div style="font-size: 11px; text-transform: uppercase; font-weight: bold; margin-bottom: 5px;">
                        Random Forest</div>
                    <div id="rfResult" style="font-size: 22px; font-weight: bold;">-</div>
                </div>
                <div class="model-card xgb">
                    <div style="font-size: 11px; text-transform: uppercase; font-weight: bold; margin-bottom: 5px;">
                        XGBoost</div>
                    <div id="xgbResult" style="font-size: 22px; font-weight: bold;">-</div>
                </div>
                <div class="model-card dt">
                    <div style="font-size: 11px; text-transform: uppercase; font-weight: bold; margin-bottom: 5px;">
                        Decision Tree</div>
                    <div id="dtResult" style="font-size: 22px; font-weight: bold;">-</div>
                </div>
            </div>

            <div class="verdict" id="verdictBox"></div>
        </div>
    </div>

    <script>
        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const internId = document.getElementById('internId').value.trim().toUpperCase();
            if (!internId) return;

            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const results = document.getElementById('results');

            error.classList.remove('show');
            results.classList.remove('show');
            loading.classList.add('show');

            try {
                const response = await fetch(`http://127.0.0.1:8000/predict-by-id?id=${internId}`);
                const data = await response.json();

                if (!response.ok) throw new Error(data.error || 'Failed to fetch intern data');

                // Fill Profile
                document.getElementById('resName').textContent = data.name;
                document.getElementById('resId').textContent = data.intern_id;

                // Fill Metrics
                const m = data.fetched_metrics;
                document.getElementById('metricsContainer').innerHTML = `
                    <div class="metric-item"><span>Sprint Completion</span> <strong>${m.Sprint_Completion}%</strong></div>
                    <div class="metric-item"><span>Task Quality</span> <strong>${m.Task_Quality}/100</strong></div>
                    <div class="metric-item"><span>Attendance</span> <strong>${m.Attendance}%</strong></div>
                    <div class="metric-item"><span>On-Time Delivery</span> <strong>${m.On_Time_Delivery}%</strong></div>
                    <div class="metric-item"><span>Communication</span> <strong>${m.Communication}/10</strong></div>
                    <div class="metric-item"><span>Tasks (Done/Assigned)</span> <strong>${m.Tasks_Completed} / ${m.Tasks_Assigned}</strong></div>
                `;

                // Fill Predictions
                document.getElementById('rfResult').textContent = data.random_forest;
                document.getElementById('xgbResult').textContent = data.xgboost;
                document.getElementById('dtResult').textContent = data.decision_tree;

                // Final Verdict
                const verdictBox = document.getElementById('verdictBox');
                if (data.agreement === "Unanimous") {
                    verdictBox.textContent = ` Unanimous Agreement: ${data.final_verdict} Performer`;
                    verdictBox.className = `verdict ${data.final_verdict.toLowerCase()}`;
                } else if (data.agreement === "Soft Vote") {
                    verdictBox.textContent = ` AI Ensemble Decision: ${data.final_verdict} Performer`;
                    verdictBox.className = `verdict ${data.final_verdict.toLowerCase()}`;
                } else {
                    verdictBox.textContent = ` Confidence-Weighted Decision: ${data.final_verdict}`;
                    verdictBox.className = `verdict ${data.final_verdict.toLowerCase()}`;
                }

                results.classList.add('show');
            } catch (err) {
                error.textContent = err.message;
                error.classList.add('show');
            } finally {
                loading.classList.remove('show');
            }
        });
    </script>
</body>

</html>
